
<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fruit Slice Lite</title>
<style>
body{margin:0;overflow:hidden;background:linear-gradient(#7ec8ff,#7dd56f)}#s{position:fixed;left:10px;top:10px;color:#fff;font:700 24px Arial}
canvas{display:block}
</style></head><body><div id=s>Score:0</div><canvas id=c></canvas><script>
const c=document.getElementById('c'),x=c.getContext('2d');function rs(){c.width=innerWidth;c.height=innerHeight}onresize=rs;rs();
let a=[],sc=0,go=0;const f=["🍎","🍌","🍇","🍉","🍓","🍒"];
setInterval(()=>{if(!go)a.push({x:Math.random()*c.width,y:c.height+40,v:2+Math.random()*3,e:Math.random()<.15?"💣":f[Math.random()*f.length|0]})},500);
function hit(px,py){for(let i=a.length-1;i>=0;i--){let o=a[i];if(px>o.x&&px<o.x+50&&py<o.y&&py>o.y-50){if(o.e=="💣"){go=1;alert("Game Over! Score:"+sc)}else{sc++;s.textContent="Score:"+sc}a.splice(i,1)}}}
c.onmousemove=e=>hit(e.clientX,e.clientY);
c.ontouchmove=e=>{let t=e.touches[0];hit(t.clientX,t.clientY);e.preventDefault()}
(function loop(){x.clearRect(0,0,c.width,c.height);x.font="48px serif";a.forEach(o=>{o.y-=o.v;x.fillText(o.e,o.x,o.y)});a=a.filter(o=>o.y>-60);requestAnimationFrame(loop)})();
</script></body></html>
