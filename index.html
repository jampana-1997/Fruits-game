<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fruit Slice Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:linear-gradient(#87CEEB,#4CAF50);
font-family:Arial;
}

canvas{
display:block;
}

#score{
position:absolute;
top:20px;
left:20px;
font-size:32px;
color:#fff;
font-weight:bold;
text-shadow:2px 2px 5px black;
}

#gameover{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:red;
display:none;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div id="score">Score : 0</div>
<div id="gameover">
GAME OVER<br><br>
Refresh to Play Again
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let score=0;
let gameOver=false;

const fruits=["🍎","🍌","🍉","🍍","🍇","🥝","🍓","🍒"];

let items=[];

function spawn(){

let bomb=Math.random()<0.15;

items.push({
x:Math.random()*canvas.width,
y:canvas.height+50,
speed:3+Math.random()*3,
emoji:bomb?"💣":fruits[Math.floor(Math.random()*fruits.length)],
bomb:bomb,
size:55
});

}

setInterval(()=>{
if(!gameOver)
spawn();
},700);

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.font="55px Arial";

for(let i=items.length-1;i>=0;i--){

let f=items[i];

f.y-=f.speed;

ctx.fillText(f.emoji,f.x,f.y);

if(f.y<-60)
items.splice(i,1);

}

requestAnimationFrame(draw);

}

draw();

function slice(x,y){

if(gameOver)return;

for(let i=items.length-1;i>=0;i--){

let f=items[i];

if(
x>f.x &&
x<f.x+50 &&
y<f.y &&
y>f.y-50
){

if(f.bomb){

gameOver=true;
document.getElementById("gameover").style.display="block";

}else{

score++;
document.getElementById("score").innerHTML="Score : "+score;

}

items.splice(i,1);

}

}

}

canvas.addEventListener("mousemove",(e)=>{
slice(e.clientX,e.clientY);
});

canvas.addEventListener("touchmove",(e)=>{

let t=e.touches[0];

slice(t.clientX,t.clientY);

});
</script>

</body>
</html>
